<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>QR Quiz</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:420px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,255,255,0.1);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

h1{
margin-bottom:20px;
font-weight:600;
background:linear-gradient(90deg,#00f5ff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#reader{
width:100%;
margin-bottom:20px;
border-radius:12px;
overflow:hidden;
}

#question{
margin:20px 0;
font-size:18px;
min-height:50px;
}

input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:12px;
background:rgba(255,255,255,0.08);
color:white;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:linear-gradient(90deg,#00f5ff,#7c3aed);
color:white;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 20px rgba(0,255,255,0.4);
}

#result{
margin-top:15px;
font-size:18px;
font-weight:500;
}

.footer{
margin-top:20px;
font-size:12px;
opacity:0.5;
}

</style>

</head>

<body>

<div class="container">

<h1> QR Quiz Scanner</h1>

<div id="reader"></div>

<h2 id="question"></h2>

<input type="text" id="answer" placeholder="Type your answer...">

<button onclick="submitAnswer()">Submit Answer</button>

<button id="scanAgain" onclick="startScanner()" style="display:none;">
🔄 Scan Again
</button>
<h3 id="result"></h3>

<div class="footer">
Scan QR to begin
</div>

<audio id="failSound" src="/static/end.mp3"></audio>
<audio id="passSound" src="/static/fun.mp3" loop></audio>
</div>

<script>

let correctAnswer = ""
let scanner

function onScanSuccess(decodedText) {

    if(decodedText === "fun"){

        scanner.clear()

        fetch("/random")
        .then(res=>res.json())
        .then(data=>{

            document.getElementById("question").innerText = data.q
            correctAnswer = data.a

        })

    }

}

scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
)

scanner.render(onScanSuccess)

function celebrate() {

const duration = 4000;
const end = Date.now() + duration;

(function frame() {

confetti({
particleCount: 5,
angle: 60,
spread: 55,
origin: { x: 0 }
});

confetti({
particleCount: 5,
angle: 120,
spread: 55,
origin: { x: 1 }
});

if (Date.now() < end) {
requestAnimationFrame(frame);
}

}());

}
function startScanner(){

// 🔊 Stop all sounds first
let passSound = document.getElementById("passSound")
let failSound = document.getElementById("failSound")

passSound.pause()
passSound.currentTime = 0

failSound.pause()
failSound.currentTime = 0


// Reset UI
document.getElementById("question").innerText = ""
document.getElementById("answer").value = ""
document.getElementById("result").innerText = ""
document.getElementById("scanAgain").style.display = "none"


// Start scanner again
scanner = new Html5QrcodeScanner(
"reader",
{ fps: 10, qrbox: 250 }
)

scanner.render(onScanSuccess)

}
function submitAnswer(){

let userAnswer = document.getElementById("answer").value
if(userAnswer === ""){
    
document.getElementById("result").innerText = "⚠️ Please enter an answer"
document.getElementById("result").style.color = "#ffaa00"

return
}

fetch("/check",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user:userAnswer,
correct:correctAnswer
})
})
.then(res=>res.json())
.then(data=>{

let passSound = document.getElementById("passSound")
let failSound = document.getElementById("failSound")

document.getElementById("scanAgain").style.display = "block"

if(data.result=="correct"){

failSound.pause()
failSound.currentTime = 0

document.getElementById("result").innerText="✅ Correct Answer"
passSound.play()
celebrate()

}else{

passSound.pause()
passSound.currentTime = 0

document.getElementById("result").innerText=
"❌ Wrong! Correct Answer: " + correctAnswer

failSound.play()

}


})

}

</script>

</body>

</html>
