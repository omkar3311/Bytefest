<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Hunt | Bytefest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/static/byte.png">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
  --bg-dark-1:#000814;
  --bg-dark-2:#001d3d;
  --bg-dark-3:#000428;
  --neon:#00f5ff;
  --neon-soft:rgba(0,245,255,0.35);
  --glass-bg:rgba(255,255,255,0.06);
  --glass-border:rgba(255,255,255,0.12);
  --text-main:#ffffff;
  --text-muted:#cfd8dc;
  --radius-lg:18px;
  --radius-md:14px;
  --blur:12px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',monospace;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg-dark-3),var(--bg-dark-2),var(--bg-dark-1));
  display:flex;
  flex-direction:column;
  color:var(--text-main);
}

#navbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000428,#001d3d);
  color:#00f5ff;
  font-size:22px;
  font-weight:700;
  letter-spacing:1.2px;
  border-bottom:1px solid rgba(0,245,255,0.25);
  box-shadow:0 0 18px rgba(0,245,255,0.25);
}
.main{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.container{
  max-width:400px;
  width:100%;
  padding:30px;
  border-radius:var(--radius-lg);
  background:var(--glass-bg);
  backdrop-filter:blur(var(--blur));
  border:1px solid var(--glass-border);
  box-shadow:
    0 0 30px var(--neon-soft),
    inset 0 0 25px rgba(255,255,255,0.04);
  text-align:center;
  animation:fadeIn 0.8s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

h3{
  color:var(--neon);
  margin-bottom:16px;
  font-size:22px;
  letter-spacing:1px;
}

#reader{
  width:220px;
  margin:16px auto;
  border-radius:var(--radius-md);
  overflow:hidden;
  border:1px solid var(--glass-border);
  box-shadow:0 0 18px var(--neon-soft);
}

#question{
  margin-top:12px;
  font-size:14px;
  color:var(--text-muted);
  min-height:40px;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:var(--radius-md);
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-border);
  color:var(--text-main);
  outline:none;
}

input:focus{
  border-color:var(--neon);
  box-shadow:0 0 12px var(--neon-soft);
}

button{
  width:100%;
  padding:12px;
  margin-top:14px;
  border-radius:var(--radius-md);
  border:none;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(90deg,var(--neon),#00bcd4);
  color:#000;
  transition:0.25s ease;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px var(--neon);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

#status{
  margin-top:14px;
  font-size:16px;
  font-weight:600;
}

#tries{
  margin-top:6px;
  font-size:13px;
  color:var(--text-muted);
}

.footer{
  margin-top:20px;
  padding:16px 0;
  text-align:center;
  font-size:13px;
}

.footer a{
  color:#b7c2d3;
  text-decoration:none;
}

.footer a:hover{
  color:var(--neon);
}

#reader,
#question,
#answerInput,
#submitBtn,
#tries{
  display:none;
}

#nameSection input,
#nameSection button{
  display:block;
}
</style>
</head>

<body>

<div id="navbar">Bytefest</div>

<div class="main">
    <div class="container">
        <h3>QR Hunt</h3>
        <div id="nameSection">
            <p style="margin-bottom:8px;color:#cbd5f5;">Enter your Gmail to start</p>
            <input id="nameInput" placeholder="Your Gmail">
            <button id="startBtn">Start Hunt</button>
        </div>

        <div id="reader"></div>

        <p id="question"></p>

        <input id="answerInput" placeholder="Enter your answer">
        <button id="submitBtn">Submit</button>

        <p id="status"></p>
        <p id="tries"></p>
    </div>
</div>
<footer class="footer">
    <a href="https://github.com/omkar3311" target="_blank" rel="noopener noreferrer">
        Devloped by Omkar Waghmare
    </a>
</footer>

<script>
let correctAnswer = "";
let attempts = 3;
let playerName = "";
let qrScanner = null;
let resultSubmitted = false;
let nextDestination = "";
let isLastRound = false;

const questionEl = document.getElementById("question");
const triesEl = document.getElementById("tries");
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const answerInput = document.getElementById("answerInput");

const nameSection = document.getElementById("nameSection");
const nameInput = document.getElementById("nameInput");
const startBtn = document.getElementById("startBtn");
const readerEl = document.getElementById("reader");

triesEl.innerText = "Attempts left: 3";


startBtn.onclick = async () => {
    const name = nameInput.value.trim();
    if (!name) {
        statusEl.innerText = "Please enter your Gmail";
        return;
    }

    const validateRes = await fetch("/validate-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ full_name: name })
    });

    const validateData = await validateRes.json();

    if (validateData.status === "pending") {
        statusEl.innerText = "You are not approved";
        return;
    }

    if (validateData.status !== "ok") {
        statusEl.innerText = "User not found";
        return;
    }

    playerName = name;
    statusEl.innerText = "Scan your QR";

    nameSection.style.display = "none";
    readerEl.style.display = "block";

    startScanner();
};


async function startScanner() {
    resetRoundState();

    qrScanner = new Html5Qrcode("reader");

    try {
        await qrScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 200 },
            async (qrText) => {
                await qrScanner.stop();

                const res = await fetch("/get-answer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        qr_data: qrText,
                        full_name: playerName
                    })
                });

                const data = await res.json();
                statusEl.innerText = data.answer;
                if (!data.answer) {
                    statusEl.innerText = "Wrong QR";
                    return;
                }

                correctAnswer = data.answer.toLowerCase();
                nextDestination = data.destination;
                isLastRound = data.is_last_round;

                questionEl.innerText = data.question;
                questionEl.style.display = "block";

                answerInput.value = "";
                answerInput.style.display = "block";

                submitBtn.disabled = false;
                submitBtn.style.display = "block";

                triesEl.innerText = "Attempts left: 3";
                triesEl.style.display = "block";

                statusEl.innerText = "";
            }
        );
    } catch {
        statusEl.innerText = "Camera unavailable";
    }
}


submitBtn.onclick = async () => {
    if (resultSubmitted) return;

    const userAnswer = answerInput.value.trim().toLowerCase();
    if (!userAnswer) return;
    if(userAnswer != correctAnswer) {
      statusEl.innerHTML = `
            <p style="color: red; font-weight: bold;">Wrong answer</p>`
    }
    if (userAnswer === correctAnswer) {
        resultSubmitted = true;
        submitBtn.disabled = true;

        statusEl.innerHTML = `
            <b style="color: green;">PASS</b><br>
            ${isLastRound 
                ? "<b>GAME END</b>" 
                : `Next Destination: <b>${nextDestination}</b>`}
        `;

        if (!isLastRound) {
            const nextBtn = document.createElement("button");
            nextBtn.innerText = "Scan Next QR";
            nextBtn.style.marginTop = "10px";

            nextBtn.onclick = () => {
                readerEl.style.display = "block";
                startScanner();
            };

            statusEl.appendChild(document.createElement("br"));
            statusEl.appendChild(nextBtn);
        }

        await fetch("/submit-result", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                full_name: playerName,
                result: "pass"
            })
        });

        return;
    }

    attempts--;
    triesEl.innerText = "Attempts left: " + attempts;

    if (attempts === 0) {
        resultSubmitted = true;
        submitBtn.disabled = true;

        statusEl.innerText = "FAIL";

        await fetch("/submit-result", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                full_name: playerName,
                result: "fail"
            })
        });
    }
};


function resetRoundState() {
    correctAnswer = "";
    attempts = 3;
    resultSubmitted = false;
    nextDestination = "";
    isLastRound = false;

    questionEl.style.display = "none";
    answerInput.style.display = "none";
    submitBtn.style.display = "none";
    triesEl.style.display = "none";
    statusEl.innerText = "Scan your QR";
}
</script>

</body>
</html>
