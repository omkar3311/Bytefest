<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Hunt | Bytefest</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: monospace;
}

body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: radial-gradient(circle at top, #1e293b, #020617 70%);
    color: #e5e7eb;
}

#navbar {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #020617;
    color: #38bdf8;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
    border-bottom: 1px solid #1e293b;
}

.main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    max-width: 380px;
    width: 100%;
    padding: 24px;
    border-radius: 14px;
    background: rgba(2, 6, 23, 0.88);
    border: 1px solid #334155;
    box-shadow:
        0 0 30px rgba(56, 189, 248, 0.18),
        inset 0 0 25px rgba(56, 189, 248, 0.06);
    text-align: center;
}

h3 {
    color: #38bdf8;
    margin-bottom: 14px;
    letter-spacing: 1px;
}

#reader {
    width: 220px;
    margin: 14px auto;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #334155;
}

#question {
    margin-top: 10px;
    font-size: 14px;
    color: #cbd5f5;
    min-height: 40px;
    display: none;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background: #020617;
    color: #e5e7eb;
    border: 1px solid #334155;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    color: #020617;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

#status {
    margin-top: 14px;
    font-size: 16px;
    font-weight: bold;
}

#tries {
    margin-top: 6px;
    font-size: 13px;
    color: #94a3b8;
    display: none;
}
.footer {
    margin-top: 20px;
    padding: 15px 0;
    text-align: center;
    font-size: 13px;
}

.footer a {
    color: #b7c2d3ff;
    text-decoration: none;
    transition: color 0.2s ease;
}

.footer a:hover {
    color: #2563eb;
    text-decoration: underline;
}
#reader,
#question,
#answerInput,
#submitBtn,
#tries {
    display: none;
}
#nameSection input,
#nameSection button {
    display: block;
}
</style>
</head>

<body>

<div id="navbar">Bytefest</div>

<div class="main">
    <div class="container">
        <h3>QR Hunt</h3>
        <div id="nameSection">
            <p style="margin-bottom:8px;color:#cbd5f5;">Enter your name to start</p>
            <input id="nameInput" placeholder="Your name">
            <button id="startBtn">Start Hunt</button>
        </div>

        <div id="reader"></div>

        <p id="question"></p>

        <input id="answerInput" placeholder="Enter your answer">
        <button id="submitBtn">Submit</button>

        <p id="status"></p>
        <p id="tries"></p>
    </div>
</div>
<footer class="footer">
    <a href="https://github.com/omkar3311" target="_blank" rel="noopener noreferrer">
        Devloped by Omkar Waghmare
    </a>
</footer>

<script>
let correctAnswer = "";
let attempts = 3;
let playerName = "";
let qrScanner = null;
let resultSubmitted = false;

const questionEl = document.getElementById("question");
const triesEl = document.getElementById("tries");
const statusEl = document.getElementById("status");
const submitBtn = document.getElementById("submitBtn");
const answerInput = document.getElementById("answerInput");

const nameSection = document.getElementById("nameSection");
const nameInput = document.getElementById("nameInput");
const startBtn = document.getElementById("startBtn");
const readerEl = document.getElementById("reader");

triesEl.innerText = "Attempts left: 3";

startBtn.onclick = async () => {
    const name = nameInput.value.trim();
    if (!name) {
        statusEl.innerText = "Please enter your name";
        return;
    }

    const validateRes = await fetch("/validate-user", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ full_name: name })
    });

    const validateData = await validateRes.json();

    if (validateData.status !== "ok") {
        statusEl.innerText = "User not found";
        return;
    }

    playerName = name;
    statusEl.innerText = "Scan your QR";

    nameSection.style.display = "none";
    readerEl.style.display = "block";

    qrScanner = new Html5Qrcode("reader");

    try {
        await qrScanner.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 200 },
            async (qrText) => {
                await qrScanner.stop();

                const res = await fetch("/get-answer", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        qr_data: qrText,
                        full_name: playerName
                    })
                });

                const data = await res.json();

                if (!data.answer) {
                    statusEl.innerText = "Wrong QR";
                    return;
                }

                correctAnswer = data.answer.toLowerCase();
                questionEl.innerText = qrText;

                questionEl.style.display = "block";
                answerInput.style.display = "block";
                submitBtn.style.display = "block";
                triesEl.style.display = "block";
                statusEl.innerText = "";
            }
        );
    } catch {
        statusEl.innerText = "Camera unavailable";
    }
};

submitBtn.onclick = async () => {
    if (resultSubmitted) return;

    const userAnswer = answerInput.value.trim().toLowerCase();
    if (!userAnswer) return;

    if (userAnswer === correctAnswer) {
        resultSubmitted = true;
        submitBtn.disabled = true;
        statusEl.innerText = "PASS";

        await fetch("/submit-result", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                full_name: playerName,
                result: "pass"
            })
        });

        return;
    }

    attempts--;
    triesEl.innerText = "Attempts left: " + attempts;

    if (attempts === 0) {
        resultSubmitted = true;
        submitBtn.disabled = true;
        statusEl.innerText = "FAIL";

        await fetch("/submit-result", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                full_name: playerName,
                result: "fail"
            })
        });
    }
};
</script>

</body>
</html>
