<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arrange/Debug | Bytefest</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/static/byte.png">
    <style>
        #left-panel {
            height: 500px;}
        #right-panel {
            height: 500px;}
        .footer {
    margin-top: 20px;
    padding: 15px 0;
    text-align: center;
    font-size: 13px;
}

.footer a {
    color: #b7c2d3ff;
    text-decoration: none;
    transition: color 0.2s ease;
}

.footer a:hover {
    color: #2563eb;
    text-decoration: underline;
}
#status-message {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 20px;
}
body{
  background:linear-gradient(135deg,#000428,#001d3d,#000814);
  color:#fff;
  font-family:Poppins,system-ui,sans-serif;
}

#navbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000428,#001d3d);
  color:#00f5ff;
  font-size:22px;
  font-weight:700;
  letter-spacing:1.2px;
  border-bottom:1px solid rgba(0,245,255,0.25);
  box-shadow:0 0 18px rgba(0,245,255,0.25);
}
#main-container{
  display:flex;
  gap:20px;
  padding:20px;
}

#left-panel,
#right-panel{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  box-shadow:0 0 30px rgba(0,245,255,0.2);
}

#left-panel{
  flex:1;
  position:relative;
  overflow:hidden;
}

#right-panel{
  flex:1;
  padding:20px;
}

#timer{
  font-size:18px;
  color:#00f5ff;
  margin-bottom:10px;
}

input,textarea{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  border-radius:12px;
  padding:10px;
}

textarea{
  width:100%;
  min-height:220px;
}

button{
  background:linear-gradient(90deg,#00f5ff,#00bcd4);
  border:none;
  border-radius:14px;
  padding:12px 18px;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 25px #00f5ff;
  transform:scale(1.05);
}

#code-scatter-area{
  position:relative;
  width:100%;
  height:100%;
}

.orbit{
  position:absolute;
  border:1px dashed rgba(0,245,255,0.25);
  border-radius:50%;
  animation:spin linear infinite;
}

.planet{
  position:absolute;
  width:12px;
  height:12px;
  border-radius:50%;
  background:#00f5ff;
  box-shadow:0 0 12px #00f5ff;
}

.sun{
  position:absolute;
  width:30px;
  height:30px;
  border-radius:50%;
  background:#ffcc00;
  box-shadow:0 0 25px #ffcc00;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}


.sharingan-container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
  height:220px;
}

.sharingan-eye{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle at center,#7a0000 40%,#300000 70%);
  border:6px solid #000;
  box-shadow:0 0 40px red, inset 0 0 30px black;
  position:relative;
  animation:spinEye 6s linear infinite;
}

.sharingan-center{
  position:absolute;
  width:40px;
  height:40px;
  background:black;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.tomoe{
  position:absolute;
  width:28px;
  height:28px;
  background:black;
  border-radius:50%;
}

.tomoe:nth-child(1){
  top:15%;
  left:50%;
  transform:translate(-50%,0);
}

.tomoe:nth-child(2){
  bottom:20%;
  left:20%;
}

.tomoe:nth-child(3){
  bottom:20%;
  right:20%;
}

@keyframes spinEye{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}


.blood{
  position:absolute;
  top:60%;
  left:50%;
  width:5px;
  height:0;
  background:linear-gradient(to bottom, #8b0000, #300000);
  transform:translateX(-50%);
  border-radius:3px;
  animation:bleed 2.5s ease forwards;
}

@keyframes bleed{
  0%{height:0}
  100%{height:100px}
}

.amaterasu{
  position:absolute;
  width:80px;
  height:100%;
  background:radial-gradient(circle, black 30%, transparent 70%);
  filter:blur(12px);
  opacity:0.8;
  animation:flameMove 3s ease-in-out infinite alternate;
}

.amaterasu.left{
  left:0;
}

.amaterasu.right{
  right:0;
}

@keyframes flameMove{
  from{transform:scaleY(1)}
  to{transform:scaleY(1.2)}
}

#left-panel{
  flex:1;
  position:relative;
  overflow:hidden; /* important */
  z-index:1;
}
.flame-border{
  position:absolute;
  top:-15px;
  left:-15px;
  width:calc(100% + 30px);
  height:calc(100% + 30px);
  border-radius:30px;
  pointer-events:none;
  z-index:0;
}

.flame-border::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:30px;
  background:
    radial-gradient(circle at 20% 10%, rgba(0,0,0,0.9) 20%, transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(0,0,0,0.9) 20%, transparent 40%),
    radial-gradient(circle at 10% 80%, rgba(0,0,0,0.9) 20%, transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(0,0,0,0.9) 20%, transparent 40%);
  filter:blur(20px);
  animation:flameFlicker 0.6s infinite alternate;
}

@keyframes flameFlicker{
  0%{
    transform:scale(1);
    opacity:0.7;
  }
  100%{
    transform:scale(1.08);
    opacity:1;
  }
}
.debug-mode {
  animation: none !important;
}

.debug-container {
  padding: 25px;
  font-family: 'Poppins', sans-serif;
}

.debug-container h2 {
  color: #00f5ff;
  margin-bottom: 15px;
}

.debug-description {
  background: rgba(255,255,255,0.06);
  padding: 15px;
  border-radius: 12px;
  line-height: 1.6;
  font-size: 15px;
  border-left: 4px solid #00f5ff;
}

.debug-examples {
  margin-top: 15px;
  font-size: 14px;
  opacity: 0.9;
}

.timer-green { color: #00ff88; }
.timer-yellow { color: #ffcc00; }
.timer-red { color: #ff0033; }

.timer-pulse {
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.welcome-floating {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #00f5ff;
    text-shadow: 0 0 20px #00f5ff;
    white-space: nowrap;
    pointer-events: none;
}
#code-scatter-area video {
  pointer-events: none;
}
    </style>
</head>

<body>

<div id="navbar">Bytefest</div>

<div id="main-container">

    <div id="left-panel">
        <div id="code-scatter-area"></div>
    </div>

    <div id="right-panel">

        <div id="timer">
            Time Left : <span id="timer-value">00</span>
        </div>

        <div style="display:flex; gap:8px;">
            <input id = "name" placeholder = "Enter Gmail">
            <input id="secret-code-input" placeholder="Secret code" />
            <button id="load-code-button">Load Code</button>
        </div>

        <div id="editor-container">
            <div id="line-numbers"></div>
            <textarea id="user-code-input" spellcheck="false"></textarea>
        </div>

        <div id="submit-container">
            <button id="submit-button">Submit Code</button>
        </div>

        <div id="status-message"></div>
        <audio id="end-audio" src="/static/end.mp3" preload="auto"></audio>
        <audio id="amaterasu-audio" src="/static/amaterasu.mp3" preload="auto"></audio>
    </div>

</div>
<footer class="footer">
    <a href="https://github.com/omkar3311" target="_blank" rel="noopener noreferrer">
        Devloped by Omkar Waghmare
    </a>
</footer>
<script>
document.addEventListener("DOMContentLoaded", () => {
console.log("index.js loaded");
let timerInterval
let timeLeft = 0
let floatingElements = []
let animationRunning = false
let SECRET_CODE = null;
const textarea = document.getElementById("user-code-input")
const lineNumbers = document.getElementById("line-numbers")
let GAME_MODE = "arrange";

function updateLineNumbers() {
    const lines = textarea.value.split("\n").length
    let html = ""
    for (let i = 1; i <= lines; i++) html += i + "<br>"
    lineNumbers.innerHTML = html
}

textarea.addEventListener("input", updateLineNumbers)
textarea.addEventListener("scroll", () => {
    lineNumbers.scrollTop = textarea.scrollTop
})

updateLineNumbers()
function generateStars(count = 80) {
    const area = document.getElementById("code-scatter-area")
    for (let i = 0; i < count; i++) {
        const star = document.createElement("div")
        star.className = "star"
        star.style.left = Math.random() * 100 + "%"
        star.style.top = Math.random() * 100 + "%"
        star.style.opacity = Math.random()
        area.appendChild(star)
    }
}
showWelcomeScreen()
generateStars()
function showWelcomeScreen() {
    const area = document.getElementById("code-scatter-area");
    area.innerHTML = "";

    animationRunning = false;
    floatingElements = [];

    const welcome = document.createElement("div");
    welcome.className = "welcome-floating";
    welcome.innerText = "Welcome to Bytefest";

    area.appendChild(welcome);

    const rect = area.getBoundingClientRect();

    const x = rect.width / 2 - 150;
    const y = rect.height / 2 - 30;

    welcome.style.transform = `translate(${x}px, ${y}px)`;

    floatingElements.push({
        el: welcome,
        x: x,
        y: y,
        dx: 0.4,
        dy: 0.3
    });

    if (!animationRunning) {
        animationRunning = true;
        animate();
    }
}
function createSolarSystem(){
    const area=document.getElementById("code-scatter-area")
    area.innerHTML=""
    const sun=document.createElement("div")
    sun.className="sun"
    area.appendChild(sun)

    const orbits=[70,110,150,190]
    orbits.forEach((r,i)=>{
        const orbit=document.createElement("div")
        orbit.className="orbit"
        orbit.style.width=r*2+"px"
        orbit.style.height=r*2+"px"
        orbit.style.top="50%"
        orbit.style.left="50%"
        orbit.style.marginLeft=-r+"px"
        orbit.style.marginTop=-r+"px"
        orbit.style.animationDuration=12+i*6+"s"

        const planet=document.createElement("div")
        planet.className="planet"
        planet.style.top="50%"
        planet.style.left="100%"

        orbit.appendChild(planet)
        area.appendChild(orbit)
    })
}
function lockEditor() {
    const textarea = document.getElementById("user-code-input")
    const submitBtn = document.getElementById("submit-button")

    textarea.readOnly = true
    submitBtn.disabled = true
    submitBtn.style.opacity = "0.6"
    submitBtn.style.cursor = "not-allowed"
}
function createSharinganVideo() {
    const area = document.getElementById("code-scatter-area")
    area.innerHTML = ""

    if (amaterasuInterval) {
        clearInterval(amaterasuInterval)
        amaterasuInterval = null
    }

    area.style.position = "relative"

    const video = document.createElement("video")
    video.src = "/static/sharingan.mp4"
    video.autoplay = true
    video.loop = true
    video.muted = true
    video.playsInline = true

    video.style.position = "absolute"
    video.style.top = "0"
    video.style.left = "0"
    video.style.width = "100%"
    video.style.height = "100%"
    video.style.objectFit = "cover"
    video.style.zIndex = "0"

    area.appendChild(video)
}
document.getElementById("load-code-button").onclick = async () => {
    const nameInput = document.getElementById("name")
    const secretInput = document.getElementById("secret-code-input")
    const status = document.getElementById("status-message")

    if (!nameInput || !secretInput) {
        console.error("Input elements not found")
        return
    }
    const name = nameInput.value.trim()
    const secret = secretInput.value.trim()
    if (name === "") {
        status.innerText = "Gmail cannot be empty"
        return
    }
    if (secret === "") {
        status.innerText = "Secret code cannot be empty"
        return
    }
    const payload = {
        name: name,
        secret_code: secret
    }
    console.log("Sending payload:", payload)
    const res = await fetch("/load-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    const data = await res.json()
    if (data.redirect) {
        window.location.href = data.redirect
        return
    }
    if (!data.success) {
        status.innerText = data.message
        return
    }
    clearInterval(timerInterval);
    timeLeft = data.time_limit;
    startTimer();
    SECRET_CODE = secret;
    GAME_MODE = data.mode;
    status.innerText = `Welcome ${name}`
    const area = document.getElementById("code-scatter-area")
    area.innerHTML = ""
    if (GAME_MODE === "arrange") {
     generateStars()
    // createSolarSystem()
    // createSharingan()
    // createSharinganVideo()
    const effects = [createSolarSystem]
    const randomEffect = effects[Math.floor(Math.random() * effects.length)]
    randomEffect()
    floatingElements=[]
    const rect=area.getBoundingClientRect()

    data.code_elements.forEach(el=>{
        const d=document.createElement("div")
        d.className="code-element"
        d.style.position = "absolute"
        d.style.zIndex = "2"
        d.innerText=el

        const x=Math.random()*(rect.width-120)
        const y=Math.random()*(rect.height-40)

        d.style.transform=`translate(${x}px,${y}px)`
        area.appendChild(d)

        floatingElements.push({
            el:d,
            x,y,
            dx:(Math.random()-0.5)*0.35,
            dy:(Math.random()-0.5)*0.35
        })
    })

    if(!animationRunning){
        animationRunning=true
        animate()
    }
}

    if (GAME_MODE === "debug") {
    const area = document.getElementById("code-scatter-area")
    area.innerHTML = `
        <div class="debug-container">
            <h2>🪲 Debugging Challenge</h2>
            <div class="debug-description">
                ${data.description.replace(/\n/g, "<br>")}
            </div>
            <div class="debug-examples">
                ${data.examples ? data.examples.replace(/\n/g, "<br>") : ""}
            </div>
        </div>
    `;

    document.getElementById("user-code-input").value = data.buggy_code;

    area.classList.add("debug-mode");
}
}

let amaterasuInterval = null
function createSharingan(){
    const area = document.getElementById("code-scatter-area")
    area.innerHTML = ""

    if(amaterasuInterval){
        clearInterval(amaterasuInterval)
        amaterasuInterval = null
    }

    const container = document.createElement("div")
    container.className = "sharingan-container"

    const eye = document.createElement("div")
    eye.className = "sharingan-eye"

    const center = document.createElement("div")
    center.className = "sharingan-center"

    const t1 = document.createElement("div")
    const t2 = document.createElement("div")
    const t3 = document.createElement("div")

    t1.className="tomoe"
    t2.className="tomoe"
    t3.className="tomoe"

    eye.appendChild(t1)
    eye.appendChild(t2)
    eye.appendChild(t3)
    eye.appendChild(center)

    container.appendChild(eye)
    area.appendChild(container)

    setTimeout(()=>{
        activateAmaterasuBorder()
        addBloodEffect(container)
    },800)

    amaterasuInterval = setInterval(()=>{
        triggerAmaterasu(container)
    },20000)
}

function triggerAmaterasu(container){
    activateAmaterasuBorder()
    addBloodEffect(container)
}
function addBloodEffect(container){
    const blood = document.createElement("div")
    blood.className = "blood"
    container.appendChild(blood)

    setTimeout(()=>{
        blood.remove()
    },2500)
}
function activateAmaterasuBorder(){
    const audio = document.getElementById("amaterasu-audio")
    if(!audio) return

    audio.pause()
    audio.currentTime = 0
    audio.play().catch(()=>{})
    const panel = document.getElementById("left-panel")
    const flame = document.createElement("div")
    flame.className = "flame-border"

    panel.parentNode.insertBefore(flame, panel)


    setTimeout(()=>{
        flame.remove()
    },4000)
}
function animate() {
    const area = document.getElementById("code-scatter-area")
    const rect = area.getBoundingClientRect()

    for (let i = 0; i < floatingElements.length; i++) {
        const a = floatingElements[i]

        a.x += a.dx
        a.y += a.dy

        const maxX = rect.width - a.el.offsetWidth
        const maxY = rect.height - a.el.offsetHeight

        if (a.x <= 0 || a.x >= maxX) a.dx *= -1
        if (a.y <= 0 || a.y >= maxY) a.dy *= -1

        for (let j = i + 1; j < floatingElements.length; j++) {
            const b = floatingElements[j]

            const dx = a.x - b.x
            const dy = a.y - b.y
            const distance = Math.sqrt(dx * dx + dy * dy)

            if (distance < 60) {
                const force = 0.03
                const nx = dx / distance
                const ny = dy / distance

                a.dx += nx * force
                a.dy += ny * force
                b.dx -= nx * force
                b.dy -= ny * force
            }
        }

        a.el.style.transform = `translate(${a.x}px, ${a.y}px)`
    }

    requestAnimationFrame(animate)
}

function playEndAudio() {
    const audio = document.getElementById("end-audio")

    if (!audio) {
        console.error("end-audio not found")
        return
    }

    audio.pause()
    audio.currentTime = 0

    audio.play().catch(err => {
        console.error("Audio playback blocked:", err)
    })
}

async function submitCode(auto = false) {
    clearInterval(timerInterval)
    lockEditor()
    if (amaterasuInterval) {
        clearInterval(amaterasuInterval)
        amaterasuInterval = null
    }

    const code = document.getElementById("user-code-input").value
    const name = document.getElementById("name").value

    const res = await fetch("/submit-code", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            secret_code: SECRET_CODE,   
            gmail : name,
            user_code: code,
            time_taken: timeLeft
        })
    })

    const data = await res.json()
    playEndAudio()
    document.getElementById("status-message").innerText =
        `Score: ${data.score}/${data.total}`
    showFinalCode(data.lines)
}
function showFinalCode(lines) {
    const area = document.getElementById("code-scatter-area")
    area.innerHTML = ""
    animationRunning = false
    floatingElements = []

    const container = document.createElement("div")
    container.style.padding = "20px"
    container.style.fontFamily = "monospace"
    container.style.fontSize = "14px"

    lines.forEach(l => {
        const div = document.createElement("div")
        div.textContent = l.correct
        div.style.padding = "4px 8px"
        div.style.borderRadius = "4px"
        div.style.marginBottom = "3px"

        div.style.background = l.is_correct
            ? "rgba(0,255,0,0.08)"
            : "rgba(255,0,0,0.15)"

        container.appendChild(div)
    })

    area.appendChild(container)
}
document.getElementById("submit-button").onclick = () => {
    submitCode(false)
}

function startTimer() {
    const timerEl = document.getElementById("timer-value")
    timerEl.innerText = timeLeft

    timerInterval = setInterval(() => {
        timeLeft--
        timerEl.innerText = timeLeft

        timerEl.className = ""

        if (timeLeft <= 10) {
            timerEl.classList.add("timer-red", "timer-pulse")
        } else if (timeLeft <= 30) {
            timerEl.classList.add("timer-yellow")
        } else {
            timerEl.classList.add("timer-green")
        }

        if (timeLeft <= 0) {
            clearInterval(timerInterval)
            submitCode(true)
        }
    }, 1000)
} 
});
</script>

</body>
</html>
