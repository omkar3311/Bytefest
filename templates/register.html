<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByteFest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  height:100vh;
  background:linear-gradient(135deg,#000428,#004e92);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

body::before, body::after{
  content:"";
  position:absolute;
  width:400px;
  height:400px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  animation:float 6s infinite alternate ease-in-out;
}

body::before{top:-100px;left:-100px;}
body::after{bottom:-120px;right:-120px;}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(30px);}
}

.container{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 0 30px rgba(0,255,255,0.4);
  text-align:center;
  animation:fadeIn 1s ease-in-out;
}

h1{
  font-family:'Orbitron',sans-serif;
  font-size:24px;
  margin-bottom:10px;
}

p{
  font-size:14px;
  margin-bottom:25px;
  color:#ddd;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:600;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00c6ff;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.success{
  color:#00ffcc;
  font-size:18px;
  font-weight:600;
}

.error{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>BYTEFEST 2026</h1>
    {% if success %}
    <p>You’re officially part of ByteFest 2026 🎉</p>
  {% else %}
    <p>Register Now & Be Part of Innovation 🚀</p>
  {% endif %}

  <form id="form" method="POST" {% if success %}style="display:none"{% endif %}>
    <input type="text" name="fullname" placeholder="Full Name" required>
    <input type="tel" name="contact" placeholder="Contact Number" pattern="[0-9]{10}" maxlength="10" required>
    <input type="text" name="college" placeholder="College Name" required>
    <button type="submit">Register Now</button>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </form>

  {% if success %}
    <div class="success" id="success">🎉 Registered Successfully!</div>
  {% endif %}
</div>

<script>
if(document.getElementById("success")){
  document.getElementById("form")?.remove()
}
</script>

</body>
</html>
