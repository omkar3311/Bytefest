<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ByteFest</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg-dark-1:#000814;
  --bg-dark-2:#001d3d;
  --bg-dark-3:#000428;
  --neon:#00f5ff;
  --neon-soft:rgba(0,245,255,0.3);
  --glass-bg:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
  --text-main:#ffffff;
  --text-muted:#cfd8dc;
  --radius-lg:20px;
  --radius-md:15px;
  --blur:10px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,var(--bg-dark-3),var(--bg-dark-2),var(--bg-dark-1));
  display:flex;
  flex-direction:column;
  align-items:center;
  color:var(--text-main);
}

.container{
  margin-top:40px;
  width:100%;
  max-width:720px;
  padding:40px;
  border-radius:20px;
  background:var(--glass-bg);
  backdrop-filter:blur(10px);
  border:1px solid var(--glass-border);
  box-shadow:0 0 30px var(--neon-soft);
}

#navbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#000428,#001d3d);
  color:#00f5ff;
  font-size:22px;
  font-weight:700;
  letter-spacing:1.2px;
  border-bottom:1px solid rgba(0,245,255,0.25);
  box-shadow:0 0 18px rgba(0,245,255,0.25);
}

h1{
  font-family:'Orbitron',sans-serif;
  text-align:center;
  margin-bottom:10px;
}

#status-text{
  text-align:center;
  color:var(--text-muted);
  margin-bottom:30px;
}

.reg-form{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.form-section{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.inputs{ grid-column:1; }
.qr{ grid-column:2; align-items:center; }
.submit{ grid-column:1 / -1; }

input{
  padding:14px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  border:1px solid var(--glass-border);
  color:#fff;
  outline:none;
}

input:focus{
  border-color:var(--neon);
  box-shadow:0 0 12px var(--neon-soft);
}

.qr-img{
  width:180px;
  border-radius:15px;
  box-shadow:0 0 20px var(--neon-soft);
}

.upload-label{
  width:100%;
  padding:12px;
  border-radius:15px;
  border:1px dashed var(--glass-border);
  text-align:center;
  cursor:pointer;
}

.upload-label input{display:none;}

.upi-pay-btn{
  width:100%;
  padding:12px;
  border-radius:15px;
  text-align:center;
  font-weight:600;
  text-decoration:none;
  color:#000;
  background:linear-gradient(90deg,#00f5ff,#00bcd4);
  box-shadow:0 0 20px rgba(0,245,255,0.4);
}

button{
  padding:14px;
  border-radius:15px;
  border:none;
  font-weight:600;
  background:linear-gradient(90deg,var(--neon),#00bcd4);
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px var(--neon);
}

.submit-wrap{
  display:flex;
  justify-content:center;
}

.error{
  color:#ff5252;
  font-size:14px;
  text-align:center;
}

.success{
  text-align:center;
  font-size:18px;
  color:var(--neon);
}

@media(max-width:768px){
  .container{padding:25px;}

  .reg-form{
    display:flex;
    flex-direction:column;
  }

  .inputs{ order:1; }
  .qr{ order:2; }
  .submit{ order:3; }

  .qr-img{width:160px;}
}

.footer{
  margin-top:30px;
  text-align:center;
  font-size:13px;
}

.footer a{
  color:#b7c2d3;
  text-decoration:none;
}
.footer a:hover{color:var(--neon);}
</style>
</head>

<body>

<div class="container">
  <h1>BYTEFEST 2026</h1>
  <p id="status-text">Register Now & Be Part of Innovation 🚀</p>

  <form id="form" class="reg-form" enctype="multipart/form-data">

    <div class="form-section inputs">
      <input name="fullname" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Gmail only" required>
      <input name="contact" placeholder="Contact Number" maxlength="10" required>
      <input name="college" placeholder="College Name" required>
    </div>

    <div class="form-section qr" id="qr-section">
      <img src="/static/reg-qr.jpeg" class="qr-img">

      <a href="upi://pay?pa=sakshisutar612@oksbi&pn=ByteFest&am=50&cu=INR"
         class="upi-pay-btn">Pay ₹50 via UPI</a>

      <label class="upload-label">
        Upload Payment Screenshot
        <input type="file" name="payment_proof" accept="image/*" required>
      </label>
    </div>

    <div class="form-section submit">
      <p class="error" id="error" style="display:none;"></p>

      <div class="submit-wrap" id="submit-wrap">
        <button type="submit">Register</button>
      </div>

      <p class="success" id="success" style="display:none;">
        Registration Successful 🎉
      </p>
    </div>

  </form>
</div>

<footer class="footer">
  <a href="https://github.com/omkar3311" target="_blank">Developed by Omkar Waghmare</a>
</footer>

<script>
const form = document.getElementById("form")
const errorEl = document.getElementById("error")
const statusText = document.getElementById("status-text")

form.addEventListener("submit", async (e) => {
  e.preventDefault()
  errorEl.style.display = "none"
  errorEl.innerText = ""

  const fileInput = form.querySelector('input[name="payment_proof"]')

  if (!fileInput.files || fileInput.files.length === 0) {
    errorEl.innerText = "Please upload the payment screenshot before registering."
    errorEl.style.display = "block"
    return
  }

  const data = new FormData(form)

  try {
    const res = await fetch("/register", {
      method: "POST",
      body: data
    })

    const json = await res.json()

    if (!json.success) {
      errorEl.innerText = json.message || "Registration failed. Try again."
      errorEl.style.display = "block"
      return
    }

    form.style.display = "none"
    statusText.innerText = "Registration received. Payment verification pending ⏳"
    document.getElementById("success").style.display = "block"

  } catch (err) {
    errorEl.innerText = "Network error. Please try again."
    errorEl.style.display = "block"
  }
})
</script>

</body>
</html>
